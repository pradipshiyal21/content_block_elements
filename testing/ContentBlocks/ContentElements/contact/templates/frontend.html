<div class="container my-5">
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card shadow p-4 h-100">
                <h3 class="mb-4">Contact Us</h3>
                <f:if condition="{data.phone}">
                    <p> <strong> Phone: </strong> <br> <a href="tel:{data.phone}" class="text-decoration-none"> {data.phone} </a> </p>
                </f:if>
                <f:if condition="{data.email}">
                    <p> <strong> Email: </strong> <br> <a href="mailto:{data.email}" class="text-decoration-none"> {data.email} </a> </p>
                </f:if>
                <f:if condition="{data.address}">
                    <p> <strong> Address: </strong> <br> <f:format.nl2br> {data.address} </f:format.nl2br> </p>
                </f:if>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow h-100">
                <f:if condition="{data.map}">
                    <div class="ratio ratio-16x9">
                        <f:format.raw>{data.map}</f:format.raw>
                    </div>
                </f:if>
            </div>
        </div>
    </div>
</div>
