<section class="py-4">
    <div class="container">
        <div class="mb-4 text-center">
            <h2 class="fw-bold mb-2">{data.title}</h2>
            <div class="text-muted">
                <f:format.html>{data.description}</f:format.html>
            </div>
        </div>
        <div class="accordion" id="faqAccordion">
            <f:for each="{data.faq_items}" as="item" iteration="i">
                <div class="accordion-item">
                    <h2 class="accordion-header" id="heading-{i.index}">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-{i.index}" aria-controls="collapse-{i.index}">
                            {item.question}
                        </button>
                    </h2>
                    <div id="collapse-{i.index}" class="accordion-collapse collapse" aria-labelledby="heading-{i.index}" data-bs-parent="#faqAccordion">
                        <div class="accordion-body">
                            <f:format.html>{item.answer}</f:format.html>
                        </div>
                    </div>
                </div>
            </f:for>
        </div>
    </div>
</section>
